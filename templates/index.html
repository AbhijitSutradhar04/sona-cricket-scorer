<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sona Cricket Scorer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

h1{
font-size:28px;
}

.score-box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

.score{
font-size:40px;
font-weight:bold;
}

.info{
font-size:18px;
margin-top:5px;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

button{
font-size:18px;
padding:15px;
border:none;
border-radius:10px;
cursor:pointer;
}

.wide{background:#ffd54f;}
.noball{background:#ffb74d;}
.nb1{background:#ffa726;}
.dot{background:#e0e0e0;}
.beat{background:#64b5f6;}
.run{background:#81c784;}
.wicket{background:#e57373;color:white;}
.undo{background:#9575cd;color:white;}
.done{background:#424242;color:white;}

.over{
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>🏏 Sona Cricket Scorer</h1>

<div class="score-box">

<div class="score" id="score">0 / 0</div>

<div class="info">Balls: <span id="balls">0</span></div>

<div class="info">Target: <span id="target">-</span></div>

<div class="over">This Over: <span id="thisover"></span></div>
</div>


<div class="buttons">

<button class="wide" onclick="wide()">Wide</button>
<button class="noball" onclick="noball()">No Ball</button>

<button class="nb1" onclick="noballrun()">No Ball+1</button>
<button class="dot" onclick="dot()">Dot</button>

<button class="beat" onclick="beat()">Beat</button>
<button class="run" onclick="run1()">1 Run</button>

<button class="run" onclick="four()">4</button>
<button class="wicket" onclick="wicket()">Wicket</button>

<button class="undo" onclick="undo()">Undo</button>
<button class="done" onclick="done()">Done</button>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
